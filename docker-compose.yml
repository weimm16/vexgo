  #   restart: unless-stopped
  #   environment:
  #     - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root-password}
  #     - MYSQL_DATABASE=vexgo_db
  #     - MYSQL_USER=vexgo_user
  #     - MYSQL_PASSWORD=${DB_PASSWORD:-your-password}
  #   volumes:
  #     - ./mysql-data:/var/lib/mysql
  #   networks:
  #     - vexgo-network
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # PostgreSQL数据库（可选）
  # postgres:
  #   image: postgres:18-alpine
  #   container_name: vexgo-postgres
  #   restart: unless-stopped
  #   environment:
  #     - POSTGRES_USER=vexgo_user
  #     - POSTGRES_PASSWORD=${DB_PASSWORD:-your-password}
  #     - POSTGRES_DB=vexgo_db
  #   volumes:
  #     - ./postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - vexgo-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U vexgo_user -d vexgo_db"]
  #     interval: 30s
