services:
  vexgo:
    image: ghcr.io/weimm16/vexgo:latest
    container_name: vexgo-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # Server configuration
      - ADDR=0.0.0.0
      - PORT=3001
      - DATA_DIR=/app/data
      
      # JWT secret (must be set in production!)
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      
      # Database configuration (SQLite is used by default)
      # To use an external database, uncomment and configure the following variables:
      # - DB_TYPE=mysql
      # - DB_HOST=mysql
      # - DB_PORT=3306
      # - DB_USER=vexgo_user
      # - DB_PASSWORD=${DB_PASSWORD:-your-password}
      # - DB_NAME=vexgo_db
      
      # Or use PostgreSQL:
      # - DB_TYPE=postgres
      # - DB_HOST=postgres
      # - DB_PORT=5432
      # - DB_USER=vexgo_user
      # - DB_PASSWORD=${DB_PASSWORD:-your-password}
      # - DB_NAME=vexgo_db
      # - DB_SSL_MODE=disable
      
      # Or use a configuration file (takes precedence over environment variables):
      # - CONFIG_FILE=/app/examples/config-mysql.yml
      # - CONFIG_FILE=/app/examples/config-postgres.yml
    volumes:
      # Persistent data directory (includes SQLite database and uploaded files)
      - ./data:/app/data
    networks:
      - vexgo-network

  # MySQL database (optional)
